<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Stock — Ropa Deportiva</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --border-strong: #D0CBC3;
    --text: #1A1714;
    --text-muted: #7A746E;
    --text-hint: #ADA8A2;
    --accent: #2D7A5F;
    --accent-light: #E8F5F0;
    --accent-dark: #1E5742;
    --danger: #C0392B;
    --danger-light: #FDECEA;
    --warn: #9C6A00;
    --warn-light: #FEF6E4;
    --success-light: #EAF5EE;
    --success: #1E7A42;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* HEADER */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #5DCAA5; display: inline-block; }
  .header-right { display: flex; gap: 8px; align-items: center; }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* METRICS */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    transition: transform 0.15s;
  }
  .metric-card:hover { transform: translateY(-1px); }
  .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-hint); margin-bottom: 6px; font-weight: 500; }
  .metric-value { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; font-family: var(--mono); }
  .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 5px; }


  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab-btn {
    padding: 10px 18px; border: none; background: none; font-family: var(--font);
    font-size: 13px; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; font-weight: 400; transition: color 0.15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: var(--font); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 14px; pointer-events: none; }
  select.filter { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: var(--font); font-size: 13px; color: var(--text); outline: none; cursor: pointer; }
  select.filter:focus { border-color: var(--accent); }

  /* BUTTONS */
  .btn { padding: 9px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); font-family: var(--font); font-size: 13px; cursor: pointer; color: var(--text); transition: all 0.15s; font-weight: 400; white-space: nowrap; }
  .btn:hover { background: var(--bg); border-color: var(--border-strong); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 6px 9px; border: 1px solid var(--border); border-radius: 8px; background: transparent; cursor: pointer; color: var(--text-muted); font-size: 13px; transition: all 0.15s; }
  .btn-icon:hover { background: var(--bg); color: var(--text); }

  /* TABLE */
  .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--bg); padding: 11px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-hint); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #FAFAF8; }
  .td-name { font-weight: 500; font-size: 13px; }
  .td-sub { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .td-mono { font-family: var(--mono); font-size: 13px; }
  .td-profit { font-family: var(--mono); font-size: 13px; color: var(--accent); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; }
  .badge-ok { background: var(--success-light); color: var(--success); }
  .badge-ok::before { background: var(--success); }
  .badge-low { background: var(--warn-light); color: var(--warn); }
  .badge-low::before { background: var(--warn); }
  .badge-out { background: #F5F3F0; color: var(--text-hint); }
  .badge-out::before { background: var(--text-hint); }
  .badge-sold { background: #FDECEA; color: #A32D2D; }
  .badge-sold::before { background: #A32D2D; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 4rem 2rem; }
  .empty-icon { font-size: 40px; margin-bottom: 1rem; opacity: 0.3; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--text-hint); }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(20,18,16,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(2px); }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 1.75rem; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-hint); line-height: 1; padding: 2px; }
  .close-btn:hover { color: var(--text); }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-hint); font-weight: 500; }
  .field input, .field select {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); font-family: var(--font); font-size: 14px; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); background: var(--surface); }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

  /* RESUMEN */
  .resumen-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .resumen-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .resumen-card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-hint); font-weight: 500; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .resumen-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .resumen-row:last-child { border-bottom: none; }
  .resumen-row-label { color: var(--text); font-weight: 400; }
  .resumen-row-val { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }
  .resumen-row-val.green { color: var(--accent); }

  /* ALERTA */
  .alert-section { background: var(--warn-light); border: 1px solid #F5D688; border-radius: var(--radius-lg); padding: 14px 18px; margin-bottom: 1.5rem; display: none; }
  .alert-title { font-size: 12px; font-weight: 600; color: var(--warn); margin-bottom: 6px; }
  .alert-items { display: flex; gap: 8px; flex-wrap: wrap; }
  .alert-chip { background: #fff; border: 1px solid #F5D688; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--warn); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    main { padding: 1rem; }
    header { padding: 0 1rem; }
    .field-grid { grid-template-columns: 1fr; }
    .resumen-grid { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: 1fr 1fr; }
    thead th:nth-child(4), tbody td:nth-child(4),
    thead th:nth-child(6), tbody td:nth-child(6) { display: none; }
  }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span> Mi Stock Deportivo</div>
  <div class="header-right">
    <button class="btn btn-sm" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#fff" onclick="exportData()">Exportar</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);color:#fff" onclick="document.getElementById('import-file').click()">Importar</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-primary btn-sm" onclick="openModal()">+ Agregar</button>
  </div>
</header>

<main>
  <div class="metrics-grid" id="metrics"></div>

  <div id="alert-low" class="alert-section">
    <div class="alert-title">⚠ Stock bajo — considerá reponer</div>
    <div class="alert-items" id="alert-items"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('inventario', this)">Inventario</button>
    <button class="tab-btn" onclick="switchTab('resumen', this)">Por categoría</button>
  </div>

  <div id="tab-inventario">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Buscar prenda, marca, color..." oninput="render()">
      </div>
      <select class="filter" id="f-tipo" onchange="render()">
        <option value="">Todas las prendas</option>
        <option>Calza</option><option>Top</option><option>Buzo</option>
        <option>Campera</option><option>Short</option><option>Musculosa</option><option>Conjunto</option><option>Otro</option>
      </select>
      <select class="filter" id="f-talle" onchange="render()">
        <option value="">Todos los talles</option>
        <option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option>
        <option>32</option><option>34</option><option>36</option><option>38</option><option>40</option><option>42</option><option>44</option>
      </select>
      <select class="filter" id="f-stock" onchange="render()">
        <option value="">Todo el stock</option>
        <option value="low">Solo stock bajo</option>
        <option value="out">Sin stock</option>
      </select>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Prenda</th><th>Marca</th><th>Talle</th><th>Color</th><th>Ingreso</th>
            <th>Stock</th><th>Mayorista</th><th>Venta</th><th>Ganancia</th><th>Estado</th><th></th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>
  </div>

  <div id="tab-resumen" style="display:none">
    <div id="resumen-content"></div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Agregar prenda</span>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="field-grid">
      <div class="field">
        <label>Tipo de prenda</label>
        <select id="f-tipo-m">
          <option>Calza</option><option>Top</option><option>Buzo</option>
          <option>Campera</option><option>Short</option><option>Musculosa</option><option>Conjunto</option><option>Otro</option>
        </select>
      </div>
      <div class="field">
        <label>Marca</label>
        <input id="f-marca" placeholder="Nike, Topper, sin marca...">
      </div>
      <div class="field">
        <label>Talle</label>
        <select id="f-talle-m">
          <option>XS</option><option>S</option><option selected>M</option><option>L</option><option>XL</option><option>XXL</option>
          <option>32</option><option>34</option><option>36</option><option>38</option><option>40</option><option>42</option><option>44</option>
        </select>
      </div>
      <div class="field">
        <label>Color</label>
        <input id="f-color" placeholder="Negro, Rosa, Azul...">
      </div>
      <div class="field">
        <label>Precio mayorista ($)</label>
        <input id="f-pmay" type="number" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Precio de venta ($)</label>
        <input id="f-pventa" type="number" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Cantidad en stock</label>
        <input id="f-stock" type="number" placeholder="1" min="0" value="1">
      </div>
      <div class="field">
        <label>Notas (opcional)</label>
        <input id="f-notas" placeholder="nueva colección, liquidación...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveItem()">Guardar prenda</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let data = [];
let editIdx = null;

function load() {
  try { data = JSON.parse(localStorage.getItem('stock_ropa_v2') || '[]'); } catch(e) { data = []; }
}
function save() { localStorage.setItem('stock_ropa_v2', JSON.stringify(data)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function switchTab(tab, el) {
  document.getElementById('tab-inventario').style.display = tab === 'inventario' ? '' : 'none';
  document.getElementById('tab-resumen').style.display = tab === 'resumen' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'resumen') renderResumen();
}

function openModal(idx) {
  editIdx = (idx != null) ? idx : null;
  document.getElementById('modal-title').textContent = editIdx != null ? 'Editar prenda' : 'Agregar prenda';
  if (editIdx != null) {
    const d = data[editIdx];
    document.getElementById('f-tipo-m').value = d.tipo;
    document.getElementById('f-marca').value = d.marca;
    document.getElementById('f-talle-m').value = d.talle;
    document.getElementById('f-color').value = d.color || '';
    document.getElementById('f-pmay').value = d.pmay;
    document.getElementById('f-pventa').value = d.pventa;
    document.getElementById('f-stock').value = d.stock;
    document.getElementById('f-notas').value = d.notas || '';
  } else {
    document.getElementById('f-marca').value = '';
    document.getElementById('f-color').value = '';
    document.getElementById('f-pmay').value = '';
    document.getElementById('f-pventa').value = '';
    document.getElementById('f-stock').value = '1';
    document.getElementById('f-notas').value = '';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function saveItem() {
  const item = {
    tipo: document.getElementById('f-tipo-m').value,
    marca: document.getElementById('f-marca').value.trim() || '—',
    talle: document.getElementById('f-talle-m').value,
    color: document.getElementById('f-color').value.trim(),
    pmay: parseFloat(document.getElementById('f-pmay').value) || 0,
    pventa: parseFloat(document.getElementById('f-pventa').value) || 0,
    stock: parseInt(document.getElementById('f-stock').value) || 0,
    notas: document.getElementById('f-notas').value.trim(),
    fecha: editIdx != null ? data[editIdx].fecha : new Date().toLocaleDateString('es-AR'),
    vendido: editIdx != null ? data[editIdx].vendido : false
  };
  if (editIdx != null) { data[editIdx] = item; toast('Prenda actualizada'); }
  else { data.push(item); toast('Prenda agregada'); }
  save(); render(); closeModal();
}

function marcarVendido(idx) {
  data[idx].vendido = !data[idx].vendido;
  save(); render();
  toast(data[idx].vendido ? 'Marcada como vendida' : 'Repuesta al stock');
}

function deleteItem(idx) {
  if (confirm('¿Eliminar esta prenda del inventario?')) {
    data.splice(idx, 1); save(); render(); toast('Prenda eliminada');
  }
}

function badge(stock) {
  if (stock === 0) return '<span class="badge badge-out">Sin stock</span>';
  if (stock <= 2) return '<span class="badge badge-low">Stock bajo</span>';
  return '<span class="badge badge-ok">Disponible</span>';
}

function fmt(n) { return Math.round(n).toLocaleString('es-AR'); }

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const fTipo = document.getElementById('f-tipo').value;
  const fTalle = document.getElementById('f-talle').value;
  const fStock = document.getElementById('f-stock').value;

  let filtered = data.map((d,i) => ({...d, _i: i})).filter(d => {
    const txt = (d.tipo+d.marca+d.color+d.notas).toLowerCase();
    const matchSearch = !search || txt.includes(search);
    const matchTipo = !fTipo || d.tipo === fTipo;
    const matchTalle = !fTalle || d.talle === fTalle;
    const matchStock = !fStock || (fStock === 'low' && !d.vendido && (parseInt(d.stock)||0) > 0 && (parseInt(d.stock)||0) <= 2) || (fStock === 'out' && !d.vendido && (parseInt(d.stock)||0) === 0);
    return matchSearch && matchTipo && matchTalle && matchStock;
  });

  const tbody = document.getElementById('tabla');
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state">
      <div class="empty-icon">👕</div>
      <div class="empty-title">Todavía no cargaste ninguna prenda</div>
      <div class="empty-sub">Hacé clic en "+ Agregar" para empezar</div>
    </div></td></tr>`;
  } else if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">Sin resultados</div>
      <div class="empty-sub">Probá cambiando el filtro</div>
    </div></td></tr>`;
  } else {
    tbody.innerHTML = filtered.map(d => {
      const gan = d.pventa - d.pmay;
      const ganPct = d.pmay > 0 ? Math.round(gan / d.pmay * 100) : 0;
      const stockNum = parseInt(d.stock) || 0;
      const estadoBadge = d.vendido
        ? '<span class="badge badge-sold">Vendido</span>'
        : (stockNum === 0 ? '<span class="badge badge-out">Sin stock</span>'
          : stockNum <= 2 ? '<span class="badge badge-low">Stock bajo</span>'
          : '<span class="badge badge-ok">En stock</span>');
      const btnVender = !d.vendido
        ? `<button class="btn-icon" onclick="marcarVendido(${d._i})" title="Marcar como vendido" style="font-size:12px">Vendido</button>`
        : `<button class="btn-icon" onclick="marcarVendido(${d._i})" title="Revertir a en stock" style="font-size:11px;color:var(--accent)">Reponer</button>`;
      return `<tr style="${d.vendido ? 'opacity:0.55' : ''}">
        <td><div class="td-name">${d.tipo}</div>${d.notas ? `<div class="td-sub">${d.notas}</div>` : ''}</td>
        <td>${d.marca}</td>
        <td><strong style="font-weight:500">${d.talle}</strong></td>
        <td>${d.color || '—'}</td>
        <td style="font-size:12px;color:var(--text-muted);white-space:nowrap">${d.fecha || '—'}</td>
        <td class="td-mono">${d.stock}</td>
        <td class="td-mono">$${fmt(d.pmay)}</td>
        <td class="td-mono">$${fmt(d.pventa)}</td>
        <td class="td-profit">$${fmt(gan)} <span style="font-size:11px;opacity:0.6">${ganPct}%</span></td>
        <td>${estadoBadge}</td>
        <td style="white-space:nowrap;display:flex;gap:4px;align-items:center">
          ${btnVender}
          <button class="btn-icon" onclick="openModal(${d._i})" title="Editar">✎</button>
          <button class="btn-icon" onclick="deleteItem(${d._i})" title="Eliminar" style="color:#C0392B">✕</button>
        </td>
      </tr>`;
    }).join('');
  }
  renderMetrics();
  renderAlerts();
}

function renderMetrics() {
  const activos = data.filter(d => !d.vendido);
  const total = activos.reduce((s,d) => s + (parseInt(d.stock) || 0), 0);
  const valMay = activos.reduce((s,d) => s + d.pmay * (parseInt(d.stock) || 0), 0);
  const valVenta = activos.reduce((s,d) => s + d.pventa * (parseInt(d.stock) || 0), 0);
  const gan = valVenta - valMay;
  document.getElementById('metrics').innerHTML = `
    <div class="metric-card"><div class="metric-label">Prendas distintas</div><div class="metric-value">${data.length}</div><div class="metric-sub">${total} unidades en total</div></div>
    <div class="metric-card"><div class="metric-label">Invertido (mayorista)</div><div class="metric-value">$${fmt(valMay)}</div><div class="metric-sub">costo total del stock</div></div>
    <div class="metric-card"><div class="metric-label">Valor a precio venta</div><div class="metric-value">$${fmt(valVenta)}</div><div class="metric-sub">si vendés todo</div></div>
    <div class="metric-card"><div class="metric-label">Ganancia potencial</div><div class="metric-value" style="color:var(--accent)">$${fmt(gan)}</div><div class="metric-sub">${valMay > 0 ? Math.round(gan/valMay*100) : 0}% de margen</div></div>
  `;
}

function renderAlerts() {
  const bajos = data.filter(d => !d.vendido && (parseInt(d.stock) || 0) > 0 && (parseInt(d.stock) || 0) <= 2);
  const sec = document.getElementById('alert-low');
  if (bajos.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  document.getElementById('alert-items').innerHTML = bajos.map(d =>
    `<span class="alert-chip">${d.tipo} ${d.talle} — ${d.stock} ud.</span>`
  ).join('');
}

function renderResumen() {
  const byTipo = {};
  const byTalle = {};
  const byMarca = {};
  data.forEach(d => {
    if (!byTipo[d.tipo]) byTipo[d.tipo] = {stock:0, gan:0, items:0};
    byTipo[d.tipo].stock += d.stock; byTipo[d.tipo].gan += (d.pventa-d.pmay)*d.stock; byTipo[d.tipo].items++;
    if (!byTalle[d.talle]) byTalle[d.talle] = 0; byTalle[d.talle] += d.stock;
    const m = d.marca === '—' ? 'Sin marca' : d.marca;
    if (!byMarca[m]) byMarca[m] = 0; byMarca[m] += d.stock;
  });

  const mkRows = (obj, keys, valFn, valFn2) =>
    keys.map(k => `<div class="resumen-row">
      <span class="resumen-row-label">${k}</span>
      <div style="display:flex;gap:16px">
        <span class="resumen-row-val">${valFn(obj[k])}</span>
        ${valFn2 ? `<span class="resumen-row-val green">${valFn2(obj[k])}</span>` : ''}
      </div>
    </div>`).join('');

  const tipoKeys = Object.keys(byTipo).sort((a,b) => byTipo[b].stock - byTipo[a].stock);
  const talleKeys = Object.keys(byTalle).sort((a,b) => byTalle[b] - byTalle[a]);
  const marcaKeys = Object.keys(byMarca).sort((a,b) => byMarca[b] - byMarca[a]);

  if (data.length === 0) {
    document.getElementById('resumen-content').innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">Cargá prendas para ver el resumen</div></div>`;
    return;
  }

  document.getElementById('resumen-content').innerHTML = `
    <div class="resumen-grid">
      <div class="resumen-card">
        <div class="resumen-card-title">Por tipo de prenda</div>
        ${mkRows(byTipo, tipoKeys, v => v.stock+' uds', v => '$'+fmt(v.gan))}
      </div>
      <div class="resumen-card">
        <div class="resumen-card-title">Por talle</div>
        ${mkRows(byTalle, talleKeys, v => v+' uds')}
      </div>
      <div class="resumen-card" style="grid-column:1/-1">
        <div class="resumen-card-title">Por marca</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))">
        ${marcaKeys.map(k => `<div class="resumen-row"><span class="resumen-row-label">${k}</span><span class="resumen-row-val">${byMarca[k]} uds</span></div>`).join('')}
        </div>
      </div>
    </div>`;
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = 'mi-stock-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  toast('Datos exportados');
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      data = imported; save(); render();
      toast('Stock importado correctamente');
    } catch { alert('El archivo no es válido. Asegurate de importar un archivo exportado desde esta app.'); }
    e.target.value = '';
  };
  r.readAsText(file);
}

load(); render();
</script>
</body>
</html>
